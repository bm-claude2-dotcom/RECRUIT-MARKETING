<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>採用コンテンツ 生成ノート | PRINCIPLE</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #f3f4f6;
      color: #1a1a2e;
      min-height: 100vh;
    }
    #root { max-width: 1000px; margin: 0 auto; padding: 24px 16px 64px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
var useState = React.useState;
var useRef   = React.useRef;

// <<AUTO_ANALYSIS_DATA_START>>
const DEFAULT_ANALYSIS = {
  "last_updated": null,
  "slack_status": {
    "company_messages": 0,
    "competitor_messages": 0
  },
  "items": [
    {
      "id": 1,
      "title": "入社3ヶ月で初登壇",
      "hook": "若手が安心して挑戦できる文化を証明する等身大エピソード",
      "category": "成長",
      "content": "入社してわずか3ヶ月、まだ右も左もわからない時期に社内勉強会で登壇したメンバーがいます。GA4の分析手法を発表すると、先輩社員から鋭い質問と温かいフィードバックが飛び交いました。「失敗を恐れず挑戦できる」——それがプリンシプルの文化。トップダウンではなく、一人ひとりが自分の成長スピードで進める環境です。\n\n#プリンシプル #新卒採用 #成長できる会社 #マーケティング"
    },
    {
      "id": 2,
      "title": "データが変える意思決定",
      "hook": "GA4やBigQueryを日常的に使う職場環境を具体的に伝える",
      "category": "技術",
      "content": "「データドリブン」という言葉は広告でよく見るけれど、実際どんな場面で使うの？プリンシプルでは、Google Analytics 4やBigQueryを日常的に扱いながら、クライアントの課題解決に取り組んでいます。直感ではなく数字で説得する——その積み重ねが、自分自身の論理思考力を確実に鍛えます。\n\n#GA4 #データ分析 #プリンシプル #デジタルマーケティング #新卒採用"
    },
    {
      "id": 3,
      "title": "月1回の全社勉強会",
      "hook": "学ぶ文化が根付いた職場を自然体で伝えるカルチャーネタ",
      "category": "カルチャー",
      "content": "プリンシプルでは月に一度、全社員が集まる勉強会を開催しています。テーマは最新のSEOアップデートから、AI活用の実例、はたまたメンバーの副業・趣味まで多岐にわたります。「業務時間内に学んでいい」という雰囲気が自然に根付いていて、入社1年目から発表の機会があります。好奇心があれば、どんどん吸収できる環境です。\n\n#プリンシプル #学習文化 #勉強会 #新卒採用"
    },
    {
      "id": 4,
      "title": "2年目でリーダー就任",
      "hook": "若手に早期から裁量が与えられるリアルなキャリアパス",
      "category": "リアル",
      "content": "入社2年目でプロジェクトリーダーに就任したメンバーがいます。「まだ自信がないのに任された」と振り返りつつも、「やるしかない状況が一番成長できた」と話してくれました。プリンシプルでは年次より実力・意欲が評価される文化があり、若いうちから本番の経験を積める点が魅力です。もちろん、先輩のサポートも手厚い。\n\n#プリンシプル #キャリア #成長 #新卒採用 #マーケティング就職"
    },
    {
      "id": 5,
      "title": "1on1が変えたキャリア観",
      "hook": "上司との対話を通じた心理的安全性・サポート体制の紹介",
      "category": "カルチャー",
      "content": "週1回の1on1が、私のキャリア観を変えました。「次どんなことに挑戦したいですか？」上司から毎回聞かれるこの言葉で、漠然としていた将来像が具体的になっていきました。評価のための面談ではなく、一緒に考えるための時間——そんな関係性を大切にしているのがプリンシプルです。\n\n#プリンシプル #1on1 #心理的安全性 #新卒採用 #働き方"
    },
    {
      "id": 6,
      "title": "文系出身でもデータの世界へ",
      "hook": "文系・理系問わず活躍できるという間口の広さを伝える",
      "category": "働く人",
      "content": "文学部出身の私が、なぜデータマーケティングの会社に？と驚かれることがあります。でもプリンシプルには、文系・理系・外語系・芸術系と多様なバックグラウンドのメンバーが揃っています。大事なのは専攻より「論理的に考えて行動できるか」。入社後の研修で基礎から学べるので、未経験でも安心です。\n\n#プリンシプル #文系 #多様性 #新卒採用 #デジタルマーケ"
    },
    {
      "id": 7,
      "title": "クライアントの成果が数字に出た",
      "hook": "自分の仕事が直接成果につながる醍醐味を語る仕事紹介",
      "category": "リアル",
      "content": "「施策を実行したら、翌月クライアントのコンバージョンが大幅に改善されました」——これは入社1年半のメンバーが実際に体験した話です。数字が明確に出るからこそ、頑張りが成果として見える。プリンシプルの仕事はやりがいの手触りが明確で、「自分が変えた」という実感をすぐに得られます。\n\n#プリンシプル #成果 #デジタルマーケティング #新卒採用"
    },
    {
      "id": 8,
      "title": "世界基準で働くとは",
      "hook": "グローバル視点・海外展開の方向性を採用ブランドに活かす",
      "category": "ビジョン",
      "content": "「世界で最も信頼されるマーケティングDXパートナー」——このビジョンを掲げるプリンシプルは、国内に留まらない視野を持っています。社内でも英語コンテンツへの取り組みや海外事例の研究が日常的に行われています。スケールの大きな仕事に挑みたい。そんな人にとって、入社後の成長環境として適した場所です。[要確認: 海外拠点の最新状況]\n\n#プリンシプル #グローバル #ビジョン #新卒採用"
    },
    {
      "id": 9,
      "title": "残業より濃度を大切に",
      "hook": "長時間労働ではなく質と効率を評価する働き方の実態",
      "category": "リアル",
      "content": "「遅くまで頑張る」より「短時間で成果を出す」——プリンシプルではこちらが評価されます。データを使って効率化し、浮いた時間で新しいスキルを学ぶ。そのサイクルが回るほど、仕事の質がどんどん上がっていきます。長時間残業ではなく「密度の濃い仕事ができるか」を大切にしている会社です。\n\n#プリンシプル #働き方 #ワークライフバランス #新卒採用"
    },
    {
      "id": 10,
      "title": "採用担当者に直接聞いてみた",
      "hook": "Q&A形式で採用基準・求める人物像を等身大で伝える",
      "category": "働く人",
      "content": "「プリンシプルが採用で一番見るポイントは何ですか？」採用担当者に直接聞いてみました。答えは「自分で考えて動ける人かどうか」。マーケティングの知識ゼロでも、課題に対して仮説を立てて試し、結果から学ぶ姿勢があれば歓迎します。華やかな実績より、等身大の思考プロセスを見せてください。\n\n#プリンシプル #採用 #新卒 #就活 #マーケティング"
    }
  ]
};
// <<AUTO_ANALYSIS_DATA_END>>

var CATEGORY_COLORS = {
  "成長":      { bg: "#e0f2fe", text: "#0369a1" },
  "技術":      { bg: "#ede9fe", text: "#6d28d9" },
  "カルチャー": { bg: "#fef3c7", text: "#92400e" },
  "リアル":    { bg: "#fce7f3", text: "#9d174d" },
  "働く人":    { bg: "#dcfce7", text: "#15803d" },
  "ビジョン":  { bg: "#fff7ed", text: "#c2410c" }
};

function catStyle(cat) {
  return CATEGORY_COLORS[cat] || { bg: "#f1f5f9", text: "#475569" };
}

function App() {
  var selState  = useState(null);
  var selectedId = selState[0];
  var setSelectedId = selState[1];

  var copyState = useState(false);
  var copied    = copyState[0];
  var setCopied = copyState[1];

  var panelRef = useRef(null);

  var data     = DEFAULT_ANALYSIS;
  var items    = data.items || [];
  var selected = items.find(function(i) { return i.id === selectedId; });
  var hasData  = !!data.last_updated;

  function selectItem(item) {
    if (selectedId === item.id) {
      setSelectedId(null);
      return;
    }
    setSelectedId(item.id);
    setCopied(false);
    setTimeout(function() {
      if (panelRef.current) {
        panelRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    }, 30);
  }

  function copyContent(text) {
    var finish = function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 2000);
    };
    if (!navigator.clipboard) {
      var ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      finish();
      return;
    }
    navigator.clipboard.writeText(text).then(finish);
  }

  return React.createElement("div", null,

    /* ── Header ──────────────────────────────────────── */
    React.createElement("header", { style: S.header },
      React.createElement("div", { style: S.brand }, "PRINCIPLE"),
      React.createElement("h1", { style: S.h1 }, "採用コンテンツ 生成ノート"),
      React.createElement("div", { style: S.statusRow },
        hasData
          ? React.createElement(React.Fragment, null,
              React.createElement("span", { style: S.badge }, "● 最終更新: " + data.last_updated),
              React.createElement("span", { style: S.statusMeta },
                "自社 " + data.slack_status.company_messages + "件 ／ 参照 " + data.slack_status.competitor_messages + "件"
              )
            )
          : React.createElement(React.Fragment, null,
              React.createElement("span", { style: Object.assign({}, S.badge, { background: "#fef9c3", color: "#854d0e" }) }, "○ サンプル表示"),
              React.createElement("span", { style: S.statusMeta }, "analyze_trends.py を実行すると実データに更新されます")
            )
      )
    ),

    /* ── Grid ────────────────────────────────────────── */
    React.createElement("div", { style: S.grid },
      items.map(function(item) {
        var isOn = selectedId === item.id;
        var cs   = catStyle(item.category);
        return React.createElement("button", {
          key:     item.id,
          style:   Object.assign({}, S.card, isOn ? S.cardOn : {}),
          onClick: function() { selectItem(item); }
        },
          React.createElement("div", { style: S.cardTop },
            React.createElement("span", { style: Object.assign({}, S.num, isOn ? S.numOn : {}) },
              ("0" + item.id).slice(-2)
            ),
            React.createElement("span", { style: Object.assign({}, S.cat, { background: cs.bg, color: cs.text }) },
              item.category
            )
          ),
          React.createElement("div", { style: S.cardTitle }, item.title),
          React.createElement("div", { style: S.cardHook  }, item.hook),
          isOn && React.createElement("div", { style: S.selMark }, "▲ 選択中")
        );
      })
    ),

    /* ── Content Panel ───────────────────────────────── */
    selected && React.createElement("div", { ref: panelRef, style: S.panel },
      React.createElement("div", { style: S.panelHead },
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { style: S.panelTitle }, selected.title),
          React.createElement("div", { style: S.panelHook  }, selected.hook)
        ),
        React.createElement("button", {
          style:   Object.assign({}, S.copyBtn, copied ? S.copyBtnOn : {}),
          onClick: function() { copyContent(selected.content); }
        }, copied ? "✓ コピー完了" : "📋 コピー")
      ),
      React.createElement("div", { style: S.panelBody }, selected.content),
      React.createElement("div", { style: S.panelFoot }, selected.content.length + " 文字")
    ),

    /* ── Empty state ─────────────────────────────────── */
    items.length === 0 && React.createElement("div", { style: S.empty },
      React.createElement("p", null, "コンテンツがまだ生成されていません。"),
      React.createElement("br"),
      React.createElement("code", { style: { background: "#f1f5f9", padding: "4px 10px", borderRadius: 6 } },
        "python analyze_trends.py"
      ),
      React.createElement("p", { style: { marginTop: 8 } }, "を実行してください。")
    ),

    /* ── Footer ──────────────────────────────────────── */
    React.createElement("footer", { style: S.footer },
      "analyze_trends.py で自動生成 ／ 参照チャンネルは分析のみ利用（転用なし）"
    )
  );
}

/* ── Styles ───────────────────────────────────────────── */
var S = {
  header: {
    background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)",
    borderRadius: 16,
    padding: "28px 32px 24px",
    marginBottom: 24,
    color: "#fff"
  },
  brand: {
    fontSize: 11,
    fontWeight: 700,
    letterSpacing: "0.2em",
    color: "#94a3b8",
    marginBottom: 6
  },
  h1: {
    fontSize: 22,
    fontWeight: 700,
    marginBottom: 12,
    lineHeight: 1.3
  },
  statusRow: {
    display: "flex",
    alignItems: "center",
    gap: 12,
    flexWrap: "wrap"
  },
  badge: {
    display: "inline-block",
    background: "#dcfce7",
    color: "#15803d",
    fontSize: 12,
    fontWeight: 600,
    padding: "3px 10px",
    borderRadius: 20
  },
  statusMeta: {
    fontSize: 12,
    color: "#94a3b8"
  },

  grid: {
    display: "grid",
    gridTemplateColumns: window.innerWidth < 640 ? "1fr" : "repeat(2, 1fr)",
    gap: 12,
    marginBottom: 4
  },
  card: {
    background: "#fff",
    border: "2px solid transparent",
    borderRadius: 12,
    padding: "16px 18px",
    textAlign: "left",
    cursor: "pointer",
    boxShadow: "0 1px 3px rgba(0,0,0,.06)",
    display: "flex",
    flexDirection: "column",
    gap: 8,
    transition: "box-shadow .15s"
  },
  cardOn: {
    border: "2px solid #6366f1",
    background: "#fafbff",
    boxShadow: "0 0 0 4px rgba(99,102,241,.08)"
  },
  cardTop: {
    display: "flex",
    alignItems: "center",
    gap: 8
  },
  num: {
    width: 28,
    height: 28,
    borderRadius: 8,
    background: "#f1f5f9",
    color: "#64748b",
    fontSize: 12,
    fontWeight: 700,
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    flexShrink: 0
  },
  numOn: {
    background: "#6366f1",
    color: "#fff"
  },
  cat: {
    fontSize: 11,
    fontWeight: 600,
    padding: "2px 8px",
    borderRadius: 12
  },
  cardTitle: {
    fontSize: 15,
    fontWeight: 700,
    color: "#1e293b",
    lineHeight: 1.4
  },
  cardHook: {
    fontSize: 12,
    color: "#64748b",
    lineHeight: 1.5
  },
  selMark: {
    fontSize: 11,
    color: "#6366f1",
    fontWeight: 600,
    marginTop: 2
  },

  panel: {
    background: "#fff",
    borderRadius: 14,
    padding: "24px 28px",
    margin: "16px 0",
    border: "2px solid #e0e7ff",
    boxShadow: "0 4px 16px rgba(99,102,241,.08)"
  },
  panelHead: {
    display: "flex",
    justifyContent: "space-between",
    alignItems: "flex-start",
    gap: 16,
    marginBottom: 20
  },
  panelTitle: {
    fontSize: 17,
    fontWeight: 700,
    color: "#1e293b",
    marginBottom: 4
  },
  panelHook: {
    fontSize: 13,
    color: "#6366f1",
    fontWeight: 500
  },
  copyBtn: {
    background: "#6366f1",
    color: "#fff",
    border: "none",
    borderRadius: 8,
    padding: "9px 18px",
    fontSize: 13,
    fontWeight: 600,
    cursor: "pointer",
    whiteSpace: "nowrap",
    flexShrink: 0
  },
  copyBtnOn: {
    background: "#16a34a"
  },
  panelBody: {
    fontSize: 14,
    lineHeight: 1.9,
    color: "#334155",
    whiteSpace: "pre-wrap",
    wordBreak: "break-all",
    background: "#f8fafc",
    borderRadius: 8,
    padding: "16px 18px",
    borderLeft: "3px solid #6366f1"
  },
  panelFoot: {
    fontSize: 11,
    color: "#94a3b8",
    textAlign: "right",
    marginTop: 10
  },

  empty: {
    textAlign: "center",
    padding: "60px 24px",
    color: "#94a3b8",
    fontSize: 14,
    lineHeight: 2
  },
  footer: {
    textAlign: "center",
    fontSize: 11,
    color: "#94a3b8",
    marginTop: 40,
    paddingTop: 20,
    borderTop: "1px solid #e2e8f0"
  }
};

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
