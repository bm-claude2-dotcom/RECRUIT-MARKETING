<html lang="ja">

      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: background .2s, border-color .2s, transform .1s;
    }

    .update-btn.err     { background: rgba(220,38,38,0.25);  border-color: rgba(220,38,38,0.5);   }

      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: rgba(255,255,255,0.9);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;

      background: #f8fafc;

      font-size: 10px; font-weight: 700; letter-spacing: 0.15em;

      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: border-color .15s, box-shadow .15s;
    }
    .card:hover { border-color: #c7d2fe; box-shadow: 0 2px 8px rgba(99,102,241,.1); }
    .card.on { border-color: #6366f1; background: #fafbff; box-shadow: 0 0 0 4px rgba(99,102,241,.08); }
    .card-row { display: flex; align-items: center; gap: 7px; }

      background: #f1f5f9; color: #64748b;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .15s, color .15s;
    }
    .card.on .num { background: #6366f1; color: #fff; }
    .cat { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
    .card-title { font-size: 13px; font-weight: 700; color: #1e293b; line-height: 1.4; }
    .card.on .card-title { color: #4338ca; }
    .card-hook { font-size: 11px; color: #64748b; line-height: 1.5; }

    /* Cards loading dim */
    #cards { transition: opacity .3s; }
    #cards.loading { opacity: 0.3; pointer-events: none; }

    .col-r { flex: 1; overflow-y: auto; padding: 14px 18px 40px; }
    .pv-wrap {
      background: #fff; border-radius: 14px; border: 1.5px solid #e2e8f0;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      display: flex; flex-direction: column;
      min-height: calc(100% - 8px); overflow: hidden;
    }
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: #94a3b8; font-size: 14px;
      line-height: 1.9; text-align: center; padding: 60px 40px;
    }
    .empty-icon { font-size: 28px; color: #cbd5e1; }
    .pv-hd { padding: 18px 22px 12px; border-bottom: 1px solid #f1f5f9; }
    .pv-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .pv-hook  { font-size: 13px; color: #6366f1; font-weight: 500; }
    .tabs {
      display: flex; padding: 0 22px;
      background: #fafbff; border-bottom: 1px solid #f1f5f9;
    }
    .tab {
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      color: #94a3b8; background: none; border: none;
      border-bottom: 2.5px solid transparent;
      cursor: pointer; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: #6366f1; }
    .tab.on { color: #6366f1; border-bottom-color: #6366f1; }
    .txt-block {
      flex: 1; display: flex; flex-direction: column;
      padding: 18px 22px 20px; gap: 14px;
    }
    .txt-body {
      flex: 1; background: #f8fafc;
      border-left: 3px solid #6366f1; border-radius: 0 10px 10px 0;
      padding: 14px 16px; font-size: 14px; line-height: 1.9;
      color: #334155; word-break: break-all; min-height: 100px;
    }
    .txt-ft { display: flex; align-items: center; justify-content: space-between; }
    .char-cnt { font-size: 12px; color: #94a3b8; }
    .copy-btn {
      background: #6366f1; color: #fff; border: none; border-radius: 8px;
      padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .copy-btn:hover { background: #4f46e5; }
    .copy-btn.done  { background: #16a34a; }

    /* Scrollbar */
    .col-l::-webkit-scrollbar, .col-r::-webkit-scrollbar { width: 4px; }
    .col-l::-webkit-scrollbar-track, .col-r::-webkit-scrollbar-track { background: transparent; }
    .col-l::-webkit-scrollbar-thumb, .col-r::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

    .modal-overlay {

      background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);

    .modal {

    .modal-hd-sub   { font-size: 12px; color: #64748b; }
    .modal-body { padding: 22px 24px; display: flex; flex-direction: column; gap: 16px; }

      color: #475569; margin-bottom: 5px; letter-spacing: 0.05em;

      flex: 1; border: 1.5px solid #e2e8f0; border-radius: 8px;

      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;

    .dot.unset { background: #f59e0b; }

    .modal-ft {
      padding: 0 24px 22px; display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn-cancel {
      background: #f1f5f9; color: #64748b; border: none; border-radius: 8px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-cancel:hover { background: #e2e8f0; }
    .btn-save {
      background: #6366f1; color: #fff; border: none; border-radius: 8px;
      padding: 9px 22px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .2s;
    }

    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-msg {
      font-size: 12px; padding: 0 24px 16px; margin-top: -8px;
      min-height: 18px;
    }
    .modal-msg.ok  { color: #16a34a; }
    .modal-msg.err { color: #dc2626; }
  </style>
</head>

    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">

    </div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-hd-title">⚙️ API キー設定</div>

      <div class="field">
        <label>SLACK BOT TOKEN</label>

          <span class="dot" id="dot-slack"></span>
        </div>
        <div class="field-hint">Slack API の Bot User OAuth Token（xoxb- から始まる）</div>
      </div>
      <div class="field">
        <label>GEMINI API KEY</label>
        <div class="field-row">
          <input type="password" id="inp-gemini" placeholder="AIza..." autocomplete="off">
          <span class="dot" id="dot-gemini"></span>
        </div>
        <div class="field-hint">Google AI Studio で発行した API キー</div>
      </div>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" id="btn-save" onclick="saveCredentials()">保存して接続</button>

  </div>
</div>

<div class="layout">

  <div class="col-r">
    <div class="pv-wrap" id="pv"></div>
  </div>
</div>

// ── Category colors ───────────────────────────────────────────────
var CAT = {
  '成長':       { bg: '#e0f2fe', fg: '#0369a1' },
  '技術':       { bg: '#ede9fe', fg: '#6d28d9' },
  'カルチャー': { bg: '#fef3c7', fg: '#92400e' },
  'リアル':     { bg: '#fce7f3', fg: '#9d174d' },
  '働く人':     { bg: '#dcfce7', fg: '#15803d' },
  'ビジョン':   { bg: '#fff7ed', fg: '#c2410c' }
};

var sel = null;
var tab = 'short';
var isLoading = false;

function cc(c)  { return CAT[c] || { bg: '#f1f5f9', fg: '#475569' }; }
function e(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pad(n) { return ('0' + n).slice(-2); }

// ── Render ────────────────────────────────────────────────────────
function renderStatus() {
  var el = document.getElementById('hd-row');
  if (DATA.last_updated) {
    el.innerHTML =
      '<span class="badge-live"> 実データに更新済み: ' + e(DATA.last_updated) + '</span>' +
      '<span class="hd-meta">自社 ' + DATA.slack_status.company_messages + '件 ／ 参照 ' + DATA.slack_status.competitor_messages + '件</span>';
  } else {
    el.innerHTML =
      '<span class="badge-sample">○ サンプルデータ表示中</span>' +
      '<span class="hd-meta">「🔄 最新データに更新」で実データを取得</span>';
  }
}

function renderCards() {
  var el = document.getElementById('cards');
  el.innerHTML = DATA.items.map(function(it) {
    var on = sel === it.id;
    var c  = cc(it.category);
    return (
      '<button class="card' + (on ? ' on' : '') + '" data-id="' + it.id + '" onclick="pick(+this.dataset.id)">' +
        '<div class="card-row">' +
          '<span class="num">' + pad(it.id) + '</span>' +
          '<span class="cat" style="background:' + c.bg + ';color:' + c.fg + '">' + e(it.category) + '</span>' +
        '</div>' +
        '<div class="card-title">' + e(it.title) + '</div>' +
        '<div class="card-hook">'  + e(it.hook)  + '</div>' +
      '</button>'
    );
  }).join('');
}

function renderPreview() {
  var el = document.getElementById('pv');
  if (!sel) {
    el.innerHTML =
      '<div class="empty">' +
        '<div class="empty-icon">←</div>' +
        '<div>左のカードを選択すると</div>' +
        '<div>コンテンツが表示されます</div>' +
      '</div>';
    return;
  }
  var it  = DATA.items.find(function(i) { return i.id === sel; });
  var txt = tab === 'short' ? (it.short_text || '') : (it.long_text || '');
  var cnt = Array.from(txt).length;
  el.innerHTML =
    '<div class="pv-hd">' +
      '<div class="pv-title">' + e(it.title) + '</div>' +
      '<div class="pv-hook">'  + e(it.hook)  + '</div>' +
    '</div>' +
    '<div class="tabs">' +
      '<button class="tab' + (tab === 'short' ? ' on' : '') + '" data-t="short" onclick="sw(this.dataset.t)">𝕏 用ショート文</button>' +
      '<button class="tab' + (tab === 'long'  ? ' on' : '') + '" data-t="long"  onclick="sw(this.dataset.t)">ブログ用長文</button>' +
    '</div>' +
    '<div class="txt-block">' +
      '<div class="txt-body">' + e(txt).replace(/\n/g, '<br>') + '</div>' +
      '<div class="txt-ft">' +
        '<span class="char-cnt">' + cnt + ' 文字</span>' +
        '<button class="copy-btn" id="cb" onclick="doCopy()">📋 コピー</button>' +
      '</div>' +
    '</div>';
}

function pick(id) {
  sel = (sel === id) ? null : id;
  tab = 'short';
  renderCards();
  renderPreview();
}

function sw(t) { tab = t; renderPreview(); }

function doCopy() {
  var it  = DATA.items.find(function(i) { return i.id === sel; });
  if (!it) return;
  var txt = tab === 'short' ? it.short_text : it.long_text;
  var btn = document.getElementById('cb');
  var done = function() {
    btn.textContent = 'コピー完了! ✓';
    btn.classList.add('done');
    setTimeout(function() {
      btn.textContent = '📋 コピー';
      btn.classList.remove('done');
    }, 2000);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(done);
  } else {
    var ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    done();
  }
}

// ── Credentials / Settings ────────────────────────────────────────
var credsOk = false;

async function checkCreds() {
  try {
    var res  = await fetch('http://127.0.0.1:5000/api/credentials-status');
    var data = await res.json();
    credsOk = data.slack_token_set && data.gemini_key_set;
    var btn = document.getElementById('settings-btn');
    if (credsOk) {
      btn.classList.remove('unconfigured');
      btn.title = '認証情報 設定済み';
    } else {
      btn.classList.add('unconfigured');
      btn.title = '認証情報 未設定 — クリックして設定';
    }
    document.getElementById('dot-slack').className  = 'dot ' + (data.slack_token_set ? 'set' : 'unset');
    document.getElementById('dot-gemini').className = 'dot ' + (data.gemini_key_set  ? 'set' : 'unset');
  } catch(e) { /* Flask未起動でも握り潰す */ }
}

function openSettings() {
  document.getElementById('modal-msg').textContent = '';
  document.getElementById('modal-msg').className   = 'modal-msg';
  document.getElementById('modal-overlay').classList.add('open');
  checkCreds();
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
}

async function saveCredentials() {
  var slack  = document.getElementById('inp-slack').value.trim();
  var gemini = document.getElementById('inp-gemini').value.trim();
  var msgEl  = document.getElementById('modal-msg');
  var saveBtn = document.getElementById('btn-save');

  if (!slack)  { msgEl.textContent = 'SLACK_BOT_TOKEN を入力してください'; msgEl.className = 'modal-msg err'; return; }
  if (!gemini) { msgEl.textContent = 'GEMINI_API_KEY を入力してください';  msgEl.className = 'modal-msg err'; return; }

  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  msgEl.textContent = '';

  try {
    var res  = await fetch('http://127.0.0.1:5000/api/set-credentials', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slack_token: slack, gemini_key: gemini })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || '保存に失敗しました');

    msgEl.textContent = '✅ 保存しました！ボタンで更新できます';
    msgEl.className   = 'modal-msg ok';
    document.getElementById('inp-slack').classList.add('ok');
    document.getElementById('inp-gemini').classList.add('ok');
    await checkCreds();
    setTimeout(closeSettings, 1400);
  } catch(err) {
    msgEl.textContent = '❌ ' + err.message;
    msgEl.className   = 'modal-msg err';
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存して接続';
  }
}

// ── Update button ─────────────────────────────────────────────────
function setBtn(state, text) {
  var btn = document.getElementById('update-btn');
  btn.className = 'update-btn' + (state ? ' ' + state : '');
  btn.disabled  = (state === 'loading');
  if (state === 'loading') {
    btn.innerHTML = '<span class="spinner"></span>' + text;
  } else {
    btn.innerHTML = text;
  }
}

async function doUpdate() {
  if (isLoading) return;
  if (!credsOk) { openSettings(); return; }
  isLoading = true;
  sel = null;
  tab = 'short';

  var cardsEl = document.getElementById('cards');
  var pvEl    = document.getElementById('pv');

  setBtn('loading', ' Slackから取得・分析中（約20秒）...');
  cardsEl.classList.add('loading');
  pvEl.innerHTML =
    '<div class="empty">' +
      '<div class="empty-icon">⏳</div>' +
      '<div>Slack データ取得中...</div>' +
      '<div style="font-size:12px;margin-top:6px;color:#64748b">Gemini で切り口を生成しています</div>' +
    '</div>';

  try {
    var res  = await fetch('http://127.0.0.1:5000/api/update');
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'サーバーエラー');

    DATA = data;
    renderStatus();
    cardsEl.classList.remove('loading');
    renderCards();
    renderPreview();

    setBtn('success', '✅ 更新完了!');
    setTimeout(function() {
      setBtn('', '🔄 最新データに更新');
      isLoading = false;
    }, 2500);

  } catch(err) {
    cardsEl.classList.remove('loading');
    pvEl.innerHTML =
      '<div class="empty">' +
        '<div class="empty-icon">❌</div>' +
        '<div>エラーが発生しました</div>' +
        '<div style="font-size:12px;color:#ef4444;margin-top:6px;max-width:300px;line-height:1.6">' + err.message + '</div>' +
      '</div>';
    setBtn('err', '❌ 再試行する');
    setTimeout(function() {
      setBtn('', '🔄 最新データに更新');
      isLoading = false;
    }, 5000);
  }
}

// ── Init ──────────────────────────────────────────────────────────
renderStatus();
renderCards();
renderPreview();
checkCreds();
</script>
