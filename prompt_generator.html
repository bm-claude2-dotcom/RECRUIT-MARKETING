<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>採用コンテンツ ライブ生成 | Principle</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #f0f4f8; }
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid #dde3ea; border-top-color: #1f6feb; border-radius: 50%; animation: spin 0.75s linear infinite; vertical-align: middle; }
  .cursor  { display: inline-block; width: 2px; height: 1.05em; background: #1f6feb; margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const useState = React.useState;
const useRef   = React.useRef;

/* ─── 定数 ──────────────────────────────────────────────────── */
const STORAGE_KEY   = "principle_gemini_key";
const SLACK_CACHE   = "principle_slack_cache";
const GEMINI_BASE   = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash";

const COMPANY_CTX = `【株式会社プリンシプル（Principle Co.,Ltd.）】
・事業: データ解析を軸としたデジタルマーケティング（GA4・GTM・BigQuery・SEO・Web広告など）
・Mission: データとアクションをつなぎ、よりよい世界を実現します
・Vision: 世界で最も信頼されるマーケティングDXパートナー
・Value: 自立したプロフェッショナル / Win-Win / 世界基準・多様性
・従業員数: 約100名、東京都千代田区
・ターゲット: 新卒・大学3-4年生。「誰と働くか」「成長できるか」「入社後のリアル」「ビジョンが叶うか」
・トンマナ: 誠実・等身大・データドリブン。煽らない・誇張しない。`;

/* ─── Gemini API ─────────────────────────────────────────────── */
async function callGemini(apiKey, prompt) {
  var res = await fetch(GEMINI_BASE + ":generateContent?key=" + apiKey, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.8, maxOutputTokens: 2048 }
    })
  });
  if (!res.ok) {
    var err = await res.json().catch(function() { return {}; });
    throw new Error(err.error ? err.error.message : "HTTP " + res.status);
  }
  var json = await res.json();
  return json.candidates[0].content.parts[0].text;
}

async function streamGemini(apiKey, prompt, onChunk, signal) {
  var res = await fetch(GEMINI_BASE + ":streamGenerateContent?alt=sse&key=" + apiKey, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.9, maxOutputTokens: 1024 }
    }),
    signal: signal
  });
  if (!res.ok) {
    var err = await res.json().catch(function() { return {}; });
    throw new Error(err.error ? err.error.message : "HTTP " + res.status);
  }
  var reader  = res.body.getReader();
  var decoder = new TextDecoder();
  var buf = "";
  while (true) {
    var readResult = await reader.read();
    if (readResult.done) break;
    buf += decoder.decode(readResult.value, { stream: true });
    var lines = buf.split("\n");
    buf = lines.pop() || "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.indexOf("data: ") === 0) {
        var raw = line.slice(6).trim();
        if (raw === "[DONE]") continue;
        try {
          var chunk = JSON.parse(raw);
          var text = chunk.candidates &&
                     chunk.candidates[0] &&
                     chunk.candidates[0].content &&
                     chunk.candidates[0].content.parts &&
                     chunk.candidates[0].content.parts[0].text || "";
          if (text) onChunk(text);
        } catch(_) {}
      }
    }
  }
}

function msgToText(messages, max) {
  return (messages || []).slice(0, max).map(function(m) { return m.text; }).join("\n---\n");
}

/* ─── App ────────────────────────────────────────────────────── */
function App() {
  /* API Key */
  var apiKeyInitial = function() { return localStorage.getItem(STORAGE_KEY) || ""; };
  var apiKeyState   = useState(apiKeyInitial);
  var apiKey        = apiKeyState[0];
  var setApiKey     = apiKeyState[1];

  var apiKeyInputState = useState(apiKeyInitial);
  var apiKeyInput      = apiKeyInputState[0];
  var setApiKeyInput   = apiKeyInputState[1];

  var showKeyState = useState(false);
  var showKey      = showKeyState[0];
  var setShowKey   = showKeyState[1];

  /* Slack Data */
  var slackInitial = function() {
    try { var r = localStorage.getItem(SLACK_CACHE); return r ? JSON.parse(r) : null; }
    catch(_) { return null; }
  };
  var slackState = useState(slackInitial);
  var slackData  = slackState[0];
  var setSlackData = slackState[1];

  /* Angles */
  var anglesState     = useState(null);
  var angles          = anglesState[0];
  var setAngles       = anglesState[1];

  var loadingAnglesState = useState(false);
  var loadingAngles      = loadingAnglesState[0];
  var setLoadingAngles   = loadingAnglesState[1];

  /* Content */
  var selectedState   = useState(null);
  var selectedAngle   = selectedState[0];
  var setSelectedAngle = selectedState[1];

  var contentState = useState("");
  var content      = contentState[0];
  var setContent   = contentState[1];

  var streamingState = useState(false);
  var isStreaming    = streamingState[0];
  var setIsStreaming = streamingState[1];

  /* UI */
  var copiedState = useState(false);
  var copied      = copiedState[0];
  var setCopied   = copiedState[1];

  var errorState = useState(null);
  var error      = errorState[0];
  var setError   = errorState[1];

  var abortRef   = useRef(null);
  var contentRef = useRef(null);

  /* ── API Key 保存 ── */
  function saveApiKey() {
    var key = apiKeyInput.trim();
    if (!key) return;
    localStorage.setItem(STORAGE_KEY, key);
    setApiKey(key);
    setError(null);
  }

  /* ── ファイル読み込み ── */
  function loadFile(ev) {
    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function() {
      try {
        var obj = JSON.parse(reader.result);
        if (!obj.own_channel || !obj.comp_channel) {
          throw new Error("形式が違います（own_channel / comp_channel が見当たりません）");
        }
        setSlackData(obj);
        try { localStorage.setItem(SLACK_CACHE, JSON.stringify(obj)); } catch(_) {}
        setAngles(null); setSelectedAngle(null); setContent(""); setError(null);
      } catch(e) { setError("ファイルエラー: " + e.message); }
    };
    reader.readAsText(file);
    ev.target.value = "";
  }

  function clearSlack() {
    localStorage.removeItem(SLACK_CACHE);
    setSlackData(null); setAngles(null); setSelectedAngle(null); setContent("");
  }

  /* ── 10切り口 生成 ── */
  async function generateAngles() {
    if (!apiKey || !slackData || loadingAngles) return;
    setLoadingAngles(true);
    setAngles(null); setSelectedAngle(null); setContent(""); setError(null);

    var own  = slackData.own_channel;
    var comp = slackData.comp_channel;
    var prompt =
      "あなたは株式会社プリンシプルの採用マーケティング専門家です。JSONのみを返してください（コードブロック・説明文は不要）。\n\n" +
      COMPANY_CTX + "\n\n" +
      "【自社Slackメッセージ（" + own.label + "） - " + own.message_count + "件 / 取得日: " + slackData.fetched_at + "】\n" +
      (msgToText(own.messages, 150) || "(メッセージなし)") + "\n\n" +
      "【参照Slackメッセージ（" + comp.label + "） - " + comp.message_count + "件】\n" +
      (msgToText(comp.messages, 100) || "(メッセージなし)") + "\n\n" +
      "## 指示\n" +
      "上記のSlackデータと採用マーケティングのトレンドを踏まえ、採用SNS・採用ブログに使える切り口を10個提案してください。\n\n" +
      "## 条件\n" +
      "- 10個はそれぞれ異なるアプローチ（社員/成長/カルチャー/技術/リアル/ビジョン など複数軸）\n" +
      "- 就活生の「誰と働くか」「成長できるか」「入社後のリアル」「ビジョンが叶うか」に応えるもの\n" +
      "- プリンシプルらしさ（データドリブン・等身大・Win-Win）が出る切り口\n" +
      "- 競合の採用コンテンツトレンドも意識する\n\n" +
      "## 出力JSON\n" +
      '{"angles":[{"id":1,"title":"切り口タイトル（20文字以内）","hook":"フック・狙い（60文字以内）","category":"カテゴリ（働く人/成長/カルチャー/技術/リアルなど）"},...10件]}';

    try {
      var raw = await callGemini(apiKey, prompt);
      raw = raw.replace(/^```(?:json)?\s*/m, "").replace(/\s*```\s*$/m, "").trim();
      var m = raw.match(/\{[\s\S]*\}/);
      if (!m) throw new Error("JSONを抽出できませんでした");
      var result = JSON.parse(m[0]);
      if (!Array.isArray(result.angles)) throw new Error("angles 配列が見つかりません");
      setAngles(result.angles.slice(0, 10));
    } catch(e) {
      setError("切り口生成エラー: " + e.message);
    } finally {
      setLoadingAngles(false);
    }
  }

  /* ── コンテンツ ストリーミング生成 ── */
  async function generateContent(angle) {
    if (!apiKey) return;
    if (abortRef.current) abortRef.current.abort();
    var ctrl = new AbortController();
    abortRef.current = ctrl;

    setSelectedAngle(angle);
    setContent("");
    setIsStreaming(true);
    setError(null);
    setCopied(false);

    var ownText = slackData ? msgToText(slackData.own_channel.messages, 80) : "";
    var prompt =
      "あなたは株式会社プリンシプルの採用マーケティング担当ライターです。\n\n" +
      COMPANY_CTX + "\n\n" +
      "## 選択された切り口\n" +
      "タイトル: " + angle.title + "\n" +
      "フック・狙い: " + angle.hook + "\n" +
      "カテゴリ: " + (angle.category || "採用") + "\n\n" +
      (ownText ? "## 元になったSlackデータ（参考）\n" + ownText + "\n\n" : "") +
      "## 指示\n" +
      "この切り口で、採用ブログ・長文SNS投稿に使える本格的なテキストコンテンツを生成してください。\n\n" +
      "## 条件\n" +
      "- 300文字程度（200〜420文字）\n" +
      "- 就活生に響く等身大の言葉・誠実なトーン\n" +
      "- 社内の熱量・カルチャーが伝わる具体的な表現\n" +
      "- 確証のない情報には [要確認: ◯◯] と明示\n" +
      "- 末尾にハッシュタグ3〜5個（#企業公式中の人 #採用 #Principle 等）\n" +
      "テキストのみ出力してください（「本文:」「出力:」などのラベルは不要）。";

    try {
      await streamGemini(apiKey, prompt, function(chunk) {
        setContent(function(prev) { return prev + chunk; });
      }, ctrl.signal);
    } catch(e) {
      if (e.name !== "AbortError") setError("コンテンツ生成エラー: " + e.message);
    } finally {
      setIsStreaming(false);
    }

    setTimeout(function() {
      if (contentRef.current) contentRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 80);
  }

  function copyContent() {
    if (!content || !navigator.clipboard) return;
    navigator.clipboard.writeText(content).then(function() {
      setCopied(true);
      setTimeout(function() { setCopied(false); }, 2000);
    });
  }

  /* ── 派生値 ── */
  var isReady = !!(apiKey && slackData);
  var own  = slackData && slackData.own_channel;
  var comp = slackData && slackData.comp_channel;
  var charLen   = content.length;
  var charColor = charLen > 420 ? "#c2541f" : charLen > 320 ? "#9a6700" : "#157a51";

  /* ─── UI ───────────────────────────────────────────────────── */
  return (
    <div style={s.wrap}>

      {/* ヘッダー */}
      <header style={s.hd}>
        <div style={s.hdMark}>PRINCIPLE</div>
        <h1 style={s.h1}>採用コンテンツ ライブ生成ツール</h1>
        <p style={s.hdSub}>Slackの社内データ × Gemini AI で、採用SNS・ブログネタをリアルタイム生成します</p>
      </header>

      {/* STEP 1 API Key */}
      <section style={s.card}>
        <span style={s.stepTag}>STEP 1</span>
        <h2 style={s.h2}>Gemini API キーを設定</h2>
        <p style={s.lead}>入力したキーはブラウザの localStorage にのみ保存され、外部サーバーには送信されません。</p>
        <div style={s.keyRow}>
          <div style={s.keyWrap}>
            <input
              style={s.keyInput}
              type={showKey ? "text" : "password"}
              placeholder="AIzaSy... または AQ...."
              value={apiKeyInput}
              onChange={function(e) { setApiKeyInput(e.target.value); }}
              onKeyDown={function(e) { if (e.key === "Enter") saveApiKey(); }}
            />
            <button style={s.eyeBtn} onClick={function() { setShowKey(!showKey); }}>
              {showKey ? "🙈" : "👁"}
            </button>
          </div>
          <button
            style={Object.assign({}, s.saveBtn, (!apiKeyInput.trim() || apiKeyInput.trim() === apiKey) ? { opacity: 0.4 } : {})}
            onClick={saveApiKey}
            disabled={!apiKeyInput.trim() || apiKeyInput.trim() === apiKey}
          >
            保存
          </button>
        </div>
        {apiKey && <div style={s.savedNote}>✓ APIキー保存済み</div>}
      </section>

      {/* STEP 2 Slack Data */}
      <section style={s.card}>
        <span style={s.stepTag}>STEP 2</span>
        <h2 style={s.h2}>Slackデータを読み込む</h2>
        <p style={s.lead}>
          <code style={s.code}>analyze_trends.py</code> を実行して生成された
          <code style={s.code}>slack_raw_data.json</code> を選択してください。読み込んだデータはブラウザにキャッシュされます。
        </p>
        <div style={s.fileRow}>
          <label style={s.fileBtn}>
            📂 slack_raw_data.json を選択
            <input type="file" accept=".json" onChange={loadFile} hidden />
          </label>
          {slackData && (
            <button style={s.clearBtn} onClick={clearSlack}>🗑 クリア</button>
          )}
        </div>
        {slackData && (
          <div style={s.dataInfo}>
            <span style={s.dataBadge}>✓ 読み込み済み</span>
            <span style={s.dataMeta}>{slackData.fetched_at} 取得</span>
            <span style={s.dataMeta}>自社 {own && own.message_count}件</span>
            <span style={s.dataMeta}>参照 {comp && comp.message_count}件</span>
          </div>
        )}
      </section>

      {/* STEP 3 Generate */}
      <section style={s.card}>
        <span style={s.stepTag}>STEP 3</span>
        <h2 style={s.h2}>10個の切り口を生成</h2>
        <p style={s.lead}>Gemini が Slack データを分析し、採用コンテンツの切り口を10個提案します。</p>
        <button
          style={Object.assign({}, s.genBtn, (!isReady || loadingAngles) ? { opacity: 0.4, cursor: "not-allowed" } : {})}
          onClick={generateAngles}
          disabled={!isReady || loadingAngles}
        >
          {loadingAngles
            ? <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                <span className="spinner" />Gemini が切り口を考えています...
              </span>
            : "▶ 10個の切り口を生成する"
          }
        </button>
        {!apiKey && <p style={s.hint}>← STEP 1 で API キーを設定してください</p>}
        {apiKey && !slackData && <p style={s.hint}>← STEP 2 で Slack データを読み込んでください</p>}
      </section>

      {/* 10切り口 グリッド */}
      {angles && (
        <section style={s.anglesSection}>
          <div style={s.anglesSectionHd}>
            <h2 style={Object.assign({}, s.h2, { fontSize: 18, margin: 0 })}>生成された切り口</h2>
            <span style={s.cntBadge}>{angles.length}件</span>
            <button
              style={s.regenBtn}
              onClick={generateAngles}
              disabled={loadingAngles}
            >
              🔄 再生成
            </button>
          </div>
          <p style={Object.assign({}, s.lead, { marginTop: 6 })}>切り口をクリックすると、その場でコンテンツをリアルタイム生成します。</p>
          <div style={s.anglesGrid}>
            {angles.map(function(a) {
              var on = selectedAngle && selectedAngle.id === a.id;
              return (
                <button
                  key={a.id}
                  style={Object.assign({}, s.angleCard, on ? s.angleCardOn : {})}
                  onClick={function() { generateContent(a); }}
                >
                  <div style={s.angleTop}>
                    <span style={Object.assign({}, s.numBadge, on ? s.numBadgeOn : {})}>
                      {("0" + a.id).slice(-2)}
                    </span>
                    <span style={Object.assign({}, s.catTag, on ? { background: "#ddf3e8", color: "#157a51" } : {})}>
                      {a.category || "採用"}
                    </span>
                  </div>
                  <div style={s.angleTitle}>{a.title}</div>
                  <div style={s.angleHook}>{a.hook}</div>
                  {on && isStreaming && <div style={s.genningNote}>生成中 ✍️</div>}
                </button>
              );
            })}
          </div>
        </section>
      )}

      {/* コンテンツ出力 */}
      {(selectedAngle !== null) && (
        <section ref={contentRef} style={s.contentSection}>
          <div style={s.contentHd}>
            <div>
              <h2 style={Object.assign({}, s.h2, { fontSize: 17, margin: 0 })}>生成されたコンテンツ</h2>
              {selectedAngle && (
                <p style={s.selectedLabel}>切り口: {selectedAngle.title}</p>
              )}
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {!isStreaming && content && (
                <button style={s.regenSmBtn} onClick={function() { generateContent(selectedAngle); }}>
                  🔄 再生成
                </button>
              )}
              <button
                style={Object.assign({}, s.copyBtn, copied ? s.copyBtnOn : {}, !content ? { opacity: 0.35 } : {})}
                onClick={copyContent}
                disabled={!content}
              >
                {copied ? "✓ コピー完了" : "📋 コピー"}
              </button>
            </div>
          </div>
          <div style={s.contentBody}>
            {content
              ? <span>{content}{isStreaming && <span className="cursor" />}</span>
              : <span style={{ color: "#a0aab5" }}>
                  {isStreaming
                    ? <span style={{ display: "flex", alignItems: "center", gap: 8 }}><span className="spinner" />生成しています...</span>
                    : "ここにコンテンツが表示されます"
                  }
                </span>
            }
          </div>
          {!isStreaming && content && (
            <div style={s.contentFooter}>
              <span style={{ fontSize: 12, color: charColor, fontWeight: 600 }}>{charLen}文字</span>
            </div>
          )}
        </section>
      )}

      {/* エラー */}
      {error && (
        <div style={s.errBox}>
          <span><strong>エラー:</strong> {error}</span>
          <button style={s.errClose} onClick={function() { setError(null); }}>×</button>
        </div>
      )}

      <footer style={s.footer}>
        APIキーとSlackデータはブラウザ内にのみ保存されます（外部サーバーへの送信なし）。
        Gemini API には直接ブラウザからリクエストします。
      </footer>
    </div>
  );
}

/* ─── スタイル ───────────────────────────────────────────────── */
var c = { ink: "#14181f", ink2: "#5b6573", line: "#e3e7ee", bg: "#f0f4f8", accent: "#1f6feb" };
var s = {
  wrap: { maxWidth: 900, margin: "0 auto", padding: "28px 20px 60px", lineHeight: 1.6, fontFamily: '-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif', color: c.ink },

  hd: { marginBottom: 28 },
  hdMark: { fontSize: 11, letterSpacing: "0.28em", fontWeight: 700, color: c.accent, marginBottom: 10 },
  h1: { fontSize: 26, margin: "0 0 8px", letterSpacing: "-0.01em" },
  hdSub: { color: c.ink2, fontSize: 14, margin: 0 },

  card: { background: "#fff", border: "1px solid " + c.line, borderRadius: 14, padding: "22px 22px 20px", marginBottom: 14, position: "relative" },
  stepTag: { position: "absolute", top: 18, right: 20, fontSize: 10, fontWeight: 700, letterSpacing: "0.15em", color: "#b0bac7", background: c.bg, padding: "3px 9px", borderRadius: 999 },
  h2: { fontSize: 16, fontWeight: 700, margin: "0 0 4px" },
  lead: { fontSize: 13, color: c.ink2, margin: "0 0 14px" },
  code: { fontFamily: "ui-monospace,monospace", fontSize: 12, background: "#f0f4f8", padding: "1px 5px", borderRadius: 4 },

  keyRow: { display: "flex", gap: 8 },
  keyWrap: { flex: 1, display: "flex", border: "1.5px solid " + c.line, borderRadius: 9, overflow: "hidden", background: "#fff" },
  keyInput: { flex: 1, fontFamily: "ui-monospace,monospace", fontSize: 13, padding: "9px 12px", border: "none", outline: "none", background: "transparent" },
  eyeBtn: { padding: "0 13px", border: "none", background: "none", cursor: "pointer", fontSize: 15 },
  saveBtn: { fontFamily: "inherit", fontSize: 13, fontWeight: 600, padding: "9px 20px", border: "none", borderRadius: 9, background: c.accent, color: "#fff", cursor: "pointer" },
  savedNote: { fontSize: 12, color: "#157a51", marginTop: 8 },
